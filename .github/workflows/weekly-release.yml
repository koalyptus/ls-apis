name: Weekly Release

on:
  schedule:
    - cron: '0 0 * * 5' # Friday 00:00 UTC = 10:00 AEST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      - run: npm run aggregate

      - run: npm run format:fix

      - run: npm run qa

      - name: Check QA is clean
        run: |
          TOTAL=$(node -p "try{JSON.parse(require('fs').readFileSync('qa-output/issues.json','utf8')).total}catch(e){999}")
          if [ "$TOTAL" -ne 0 ]; then
            echo "QA found $TOTAL issues. Aborting release."
            cat qa-output/issues.json
            exit 1
          fi
          echo "QA clean — 0 issues"

      - name: Bump version
        run: npm version patch --no-git-tag-version --workspace=@ls-apis/cli

      - name: Create release branch and PR
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          BRANCH="release/v$VERSION"
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: release v$VERSION"
          git push origin "$BRANCH" --force
          PR=$(gh pr view "$BRANCH" --json number --jq '.number' 2>/dev/null || \
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Release v$VERSION" \
              --body "Automated weekly release." | sed 's|.*/pull/||')
          gh pr merge --squash "$PR"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        run: npm publish --workspace=@ls-apis/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          gh release create "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
