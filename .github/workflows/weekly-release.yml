name: Weekly Release

on:
  schedule:
    - cron: '0 0 * * 5' # Friday 00:00 UTC = 10:00 AEST
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      - run: npm run aggregate

      - run: npm run format:fix

      - run: npm run qa

      - name: Check QA is clean
        run: |
          TOTAL=$(node -p "try{JSON.parse(require('fs').readFileSync('qa-output/issues.json','utf8')).total}catch(e){999}")
          if [ "$TOTAL" -ne 0 ]; then
            echo "QA found $TOTAL issues. Aborting release."
            cat qa-output/issues.json
            exit 1
          fi
          echo "QA clean — 0 issues"

      - run: npm run format:fix

      - name: Bump version
        run: npm version patch --no-git-tag-version --workspace=@ls-apis/cli

      - name: Create release branch and PR
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          BRANCH="release/v$VERSION"
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: release v$VERSION"
          git push origin "$BRANCH" --force
          if ! gh pr view "$BRANCH" --json id &>/dev/null; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "Release v$VERSION" \
              --body "Automated weekly release."
          fi
          GH_TOKEN=${{ secrets.PAT }} gh pr merge --auto --squash "$BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    if: github.event_name == 'push' && startsWith(github.event.head_commit.message, 'Release v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci

      - name: Check if release commit
        id: check
        run: |
          MSG=$(git log -1 --format=%s)
          if [[ "$MSG" == "Release v"* ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.is_release == 'true'
        run: npm publish --workspace=@ls-apis/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.is_release == 'true'
        run: |
          VERSION=$(node -p "require('./packages/cli/package.json').version")
          gh release create "v$VERSION" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
